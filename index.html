<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakidots</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

  <!-- 커서 -->
  <div class="cursor-mv" id="cursorMv">Click 2 MV</div>

  <!-- 모바일 전용 -->
  <a href="mv.html" class="mobile-mv-link">Click 2 MV</a>

  <!-- 비주얼라이저 비디오 -->
  <div class="video-container" id="videoContainer">
    <video class="bg-video" id="bgVideo" autoplay loop muted playsinline webkit-playsinline>
      <source src="videos/vis.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 배경 오디오 -->
  <audio id="bgAudio" loop preload="auto">
    <source src="audio/vis_audio.m4a" type="audio/mp4">
  </audio>

  <!-- 우측 상단 네비게이션 -->
  <nav class="home-nav">
    <a href="lyrics.html">Lyrics</a>
    <a href="behind.html">Behind</a>
    <a href="contact.html">Contact</a>
  </nav>

  <script>
    const cursorEl = document.getElementById('cursorMv');
    const bgVideo  = document.getElementById('bgVideo');

    let audioStarted = false;

    document.addEventListener('mousemove', e => {
      cursorEl.style.left = e.clientX + 'px';
      cursorEl.style.top  = e.clientY + 'px';
      if (audioStarted) cursorEl.style.opacity = '1';
    });

    document.addEventListener('mouseleave', () => {
      cursorEl.style.opacity = '0';
    });

    const bgAudio = document.getElementById('bgAudio');

    bgVideo.play().catch(() => {});

    document.getElementById('videoContainer').addEventListener('click', () => {
      if (!audioStarted) {
        bgAudio.play().catch(() => {});
        audioStarted = true;
      } else {
        window.location.href = 'mv.html';
      }
    });
  </script>

</body>
</html>
